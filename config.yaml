# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: RecpieBuddy add-on
version: "2.0.8"
slug: example
description: Recipe Buddy is a tool that enables the easy adding of recipes to Grocy through web scraping.
url: "https://github.com/georgegebbett/recipe-buddy"
arch:
  - aarch64
  - amd64
ingress: true
ingress_stream: true
init: false
panel_icon: mdi:book-open
panel_admin: false
backup: cold
map:
  - rb_data
ports_description:
  - 3000/tcp: main port
ports:
  - 3000/tcp: 3005
webui: http://[HOST]:[PORT:3005]/recipes
image: "ghcr.io/georgegebbett/recipe-buddy"
schema:
  GROCY_API_KEY: str
  GROCY_BASE_URL: str
  NEXTAUTH_SECRET: str
  NEXTAUTH_URL: str
